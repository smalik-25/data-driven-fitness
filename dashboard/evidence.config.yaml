# Evidence v40 requires a plugins block declaring component + datasource plugins.
plugins:
  components:
    "@evidence-dev/core-components": {}
  datasources:
    "@evidence-dev/duckdb": {}

# Dark ground to match the Sam Malik design system (terminal-meets-gothic).
# On-brand chart colors are re-added under `theme:` once the site renders.
appearance:
  default: dark
  switcher: true
