version: 2

models:
  - name: silver_dexa
    description: "Two DEXA scans, total + regional. Grain: (scan_date, region)."
    columns:
      - name: scan_date
        data_tests: [not_null]
      - name: region
        data_tests:
          - not_null
          - accepted_values:
              values: ["arms", "legs", "trunk", "android", "gynoid", "total"]
    # grain uniqueness covered by tests/assert_dexa_grain_unique.sql

  - name: silver_daily_energy
    description: >
      Daily energy balance. Grain: one day. TDEE = active + basal energy;
      net_balance = intake - TDEE (negative = deficit).
    columns:
      - name: day
        data_tests: [not_null, unique]
      - name: tdee_kcal
        data_tests: [not_null]

  - name: silver_daily_protein
    description: >
      Daily protein (canonical LoseIt food-log value) with bodyweight carried
      forward and protein g/kg. ah_protein_g is the Apple Health cross-check.
      Grain: one day.
    columns:
      - name: day
        data_tests: [not_null, unique]
      - name: protein_g
        data_tests: [not_null]

  - name: silver_daily_recovery
    description: "Daily resting HR, HRV, and sleep. Grain: one day."
    columns:
      - name: day
        data_tests: [not_null, unique]

  - name: silver_daily_training_volume
    description: >
      Daily training volume by DEXA region (working sets only). Grain:
      (workout_date, region).
    columns:
      - name: region
        data_tests:
          - accepted_values:
              values: ["arms", "legs", "trunk"]
    # grain uniqueness covered by tests/assert_training_volume_grain_unique.sql
